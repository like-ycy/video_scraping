<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>视频库预览</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #15151a; color: #e8e8ea; }
  header { padding: 16px 24px; background: #1f1f27; border-bottom: 1px solid #2c2c36; }
  header h1 { font-size: 18px; font-weight: 600; }
  .container { padding: 24px; }
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .tab { padding: 8px 16px; background: #2a2a34; border-radius: 20px; cursor: pointer; font-size: 14px; transition: .15s; }
  .tab:hover { background: #353541; }
  .tab.active { background: #d94f8a; color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 20px; }
  .card { background: #1f1f27; border-radius: 8px; overflow: hidden; cursor: pointer; transition: .15s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.4); }
  .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #2a2a34; }
  .card .meta { padding: 10px 12px; }
  .card .fanha { font-size: 16px; font-weight: 600; color: #d94f8a; }
  .card .title { font-size: 13px; color: #aaa; margin-top: 3px; line-height: 1.3; max-height: 2.6em; overflow: hidden; }
  .card .sub { font-size: 13px; color: #888; margin-top: 5px; }
  .empty { color: #888; padding: 40px; text-align: center; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 100; overflow-y: auto; }
  .overlay.show { display: block; }
  .overlay-inner { max-width: 1500px; margin: 40px auto; padding: 0 20px; }
  .overlay-close {
    position: fixed; top: 20px; right: 24px; z-index: 110;
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; line-height: 1; cursor: pointer; color: #e8e8ea;
    background: rgba(255,255,255,.12); border: none; border-radius: 50%;
    transition: background .15s, transform .15s;
  }
  .overlay-close:hover { background: rgba(255,255,255,.28); transform: rotate(90deg); }
  .overlay img.cover { width: 100%; max-width: 1080px; display: block; margin: 0 auto 16px; border-radius: 8px; }
  .player { position: relative; max-width: 1080px; margin: 0 auto 16px; cursor: pointer; }
  .player img.cover { margin-bottom: 0; }
  .play-mask {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 64px; color: #fff; background: rgba(0,0,0,.25); border-radius: 8px;
    transition: background .15s;
  }
  .player:hover .play-mask { background: rgba(0,0,0,.45); }
  .player-video { width: 100%; max-width: 1080px; display: block; margin: 0 auto 16px; border-radius: 8px; background: #000; }
  .detail-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .detail-row { font-size: 13px; color: #bbb; margin: 4px 0; }
  .shots { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-top: 16px; }
  .shots img { width: 100%; border-radius: 6px; cursor: pointer; }
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 200; align-items: center; justify-content: center; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 92vw; max-height: 92vh; }
  .lightbox .nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
    font-size: 26px; line-height: 1; color: #fff; cursor: pointer; user-select: none;
    background: rgba(0,0,0,.45); border: none; border-radius: 50%;
    transition: background .15s;
  }
  .lightbox .nav:hover { background: rgba(217,79,138,.85); }
  .lightbox .prev { left: 16px; }
  .lightbox .next { right: 16px; }
  .lightbox .lb-close {
    position: fixed; top: 20px; right: 24px; z-index: 210;
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; line-height: 1; color: #e8e8ea; cursor: pointer;
    background: rgba(255,255,255,.12); border: none; border-radius: 50%;
    transition: background .15s, transform .15s;
  }
  .lightbox .lb-close:hover { background: rgba(255,255,255,.28); transform: rotate(90deg); }
</style>
</head>
<body>
<header><h1>视频库预览</h1></header>
<div class="container">
  <div class="tabs" id="tabs"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">没有数据。先运行刮削脚本生成 JSON。</div>
</div>

<div class="overlay" id="overlay">
  <button type="button" class="overlay-close" aria-label="关闭" onclick="closeDetail()">&times;</button>
  <div class="overlay-inner" id="overlayInner"></div>
</div>

<div class="lightbox" id="lightbox">
  <button type="button" class="lb-close" aria-label="关闭" onclick="closeLightbox()">&times;</button>
  <button type="button" class="nav prev" aria-label="上一张" onclick="lbMove(-1)">&#10094;</button>
  <img id="lbImg" src="" alt="放大图">
  <button type="button" class="nav next" aria-label="下一张" onclick="lbMove(1)">&#10095;</button>
</div>

<script>
let index = { actresses: [] };
let current = null;
let currentActorDir = "";

function fmtSize(bytes) {
  if (!bytes) return "-";
  const u = ["B", "KB", "MB", "GB", "TB"];
  let i = 0, n = bytes;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return n.toFixed(1) + " " + u[i];
}

// 图片字段在 meta/<演员>.json 中以演员目录为基准存放，
// 预览页面位于视频根目录，需拼上演员目录前缀才能正确加载。
function imgUrl(rel) {
  if (!rel) return "";
  return currentActorDir ? currentActorDir + "/" + rel : rel;
}

async function loadIndex() {
  try {
    const r = await fetch("index.json");
    index = await r.json();
  } catch (e) {
    document.getElementById("empty").style.display = "block";
    return;
  }
  renderTabs();
  if (index.actresses.length) selectActress(0);
  else document.getElementById("empty").style.display = "block";
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  index.actresses.forEach((a, i) => {
    const el = document.createElement("div");
    el.className = "tab" + (i === 0 ? " active" : "");
    el.textContent = `${a.name} (${a.video_count})`;
    el.onclick = () => selectActress(i);
    tabs.appendChild(el);
  });
}

async function selectActress(i) {
  document.querySelectorAll(".tab").forEach((t, j) => { t.classList.toggle("active", j === i); });
  const a = index.actresses[i];
  // json 现位于 演员目录/meta/ 下，演员目录为去掉末两段（meta/文件名）
  const parts = a.json.split("/");
  currentActorDir = parts.length > 2 ? parts.slice(0, -2).join("/") : "";
  const r = await fetch(a.json);
  const data = await r.json();
  current = data.videos || [];
  renderGrid(current);
}

function renderGrid(videos) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  videos.forEach((v, idx) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${imgUrl(v.cover)}" alt="${v.fanha} 封面" loading="lazy" onerror="this.style.visibility='hidden'">
      <div class="meta">
        <div class="fanha">${v.fanha}</div>
        <div class="title">${v.title || ""}</div>
        <div class="sub">${v.release_date || "-"} · ${fmtSize(v.file_size)}</div>
      </div>`;
    card.onclick = () => openDetail(idx);
    grid.appendChild(card);
  });
}

function openDetail(idx) {
  const v = current[idx];
  const inner = document.getElementById("overlayInner");
  const shots = (v.screenshots || []).map((s, i) =>
    `<img src="${imgUrl(s)}" alt="截图 ${i + 1}" loading="lazy" onclick="openLightbox(${idx}, ${i})" onerror="this.style.visibility='hidden'">`
  ).join("");
  // 视频相对 server 根（与封面图同机制）：演员目录/视频文件名。
  // 默认显示封面图 + 播放遮罩，点击封面后原地替换为 <video> 播放。
  const videoSrc = v.video_file
    ? encodeURI((currentActorDir ? currentActorDir + "/" : "") + v.video_file)
    : "";
  const player = videoSrc
    ? `<div class="player" onclick="startPlay(this)" data-src="${videoSrc}">
         <img class="cover" src="${imgUrl(v.cover)}" alt="${v.fanha} 封面大图" onerror="this.style.visibility='hidden'">
         <div class="play-mask">▶</div>
       </div>`
    : `<img class="cover" src="${imgUrl(v.cover)}" alt="${v.fanha} 封面大图" onerror="this.style.visibility='hidden'">`;
  inner.innerHTML = `
    ${player}
    <div class="detail-title">${v.title || v.fanha}</div>
    <div class="detail-row">番号：${v.fanha}</div>
    <div class="detail-row">发布时间：${v.release_date || "-"}</div>
    <div class="detail-row">长度：${v.length || "-"}</div>
    <div class="detail-row">类别：${(v.genres || []).join("、") || "-"}</div>
    <div class="detail-row">演员：${(v.cast || []).join("、") || "-"}</div>
    <div class="detail-row">文件名：${v.video_file || "-"}</div>
    <div class="detail-row">文件大小：${fmtSize(v.file_size)}</div>
    <div class="shots">${shots}</div>`;
  document.getElementById("overlay").classList.add("show");
}

function startPlay(el) {
  const src = el.getAttribute("data-src");
  if (!src) return;
  const video = document.createElement("video");
  video.src = src;
  video.controls = true;
  video.autoplay = true;
  video.className = "player-video";
  el.replaceWith(video);
}

let lbList = [];
let lbPos = 0;

function openLightbox(vIdx, sIdx) {
  lbList = current[vIdx].screenshots || [];
  lbPos = sIdx;
  showLb();
  document.getElementById("lightbox").classList.add("show");
}
function showLb() {
  document.getElementById("lbImg").src = imgUrl(lbList[lbPos] || "");
}
function lbMove(d) {
  lbPos = (lbPos + d + lbList.length) % lbList.length;
  showLb();
}
function closeLightbox() { document.getElementById("lightbox").classList.remove("show"); }
function closeDetail() { document.getElementById("overlay").classList.remove("show"); }

document.getElementById("lightbox").addEventListener("click", (e) => {
  if (e.target.id === "lightbox") closeLightbox();
});

document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") closeDetail();
});

document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (document.getElementById("lightbox").classList.contains("show")) closeLightbox();
  else if (document.getElementById("overlay").classList.contains("show")) closeDetail();
});

loadIndex();
</script>
</body>
</html>
